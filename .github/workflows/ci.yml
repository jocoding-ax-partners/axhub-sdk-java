name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          persist-credentials: false
      - uses: gradle/actions/wrapper-validation@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # gradle/actions/wrapper-validation v6.1.1
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # actions/setup-java v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # gradle/actions/setup-gradle v6.1.1
      - name: Conformance (42 vectors) + route parity (177)
        run: ./gradlew regressionTest --no-configuration-cache
      - run: ./gradlew check --no-configuration-cache
