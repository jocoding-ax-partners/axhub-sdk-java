name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5
        with:
          persist-credentials: false
      - uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # gradle/actions/wrapper-validation v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # actions/setup-java v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # gradle/actions/setup-gradle v5
      - name: Conformance (42 vectors) + route parity (177)
        run: ./gradlew regressionTest --no-configuration-cache
      - run: ./gradlew check --no-configuration-cache
