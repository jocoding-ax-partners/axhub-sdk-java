name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # gradle/actions/wrapper-validation v6.1.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # actions/setup-java v5.4.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # gradle/actions/setup-gradle v6.1.0
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify CI succeeded on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --json databaseId --jq 'length')
          [ "$count" -gt 0 ] || { echo "No successful ci.yml run found for $GITHUB_SHA"; exit 1; }
      - name: Verify release tag matches Gradle version
        run: |
          v=$(./gradlew -q properties --no-configuration-cache | awk -F': ' '/^version:/ { print $2; exit }')
          [ "$GITHUB_REF_NAME" = "v$v" ] || { echo "tag != v$v"; exit 1; }
      - name: Check before publish
        run: ./gradlew check --no-configuration-cache
      - name: Local publish dry-run
        run: ./gradlew publishToMavenLocal --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: maven-central
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          persist-credentials: false
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # gradle/actions/wrapper-validation v6.1.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # actions/setup-java v5.4.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # gradle/actions/setup-gradle v6.1.0
      - name: Publish and release to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for Maven Central artifact
        run: |
          version="$GITHUB_REF_NAME"
          version="${version#v}"
          url="https://repo1.maven.org/maven2/ai/axhub/axhub-sdk-java/$version/axhub-sdk-java-$version.pom"
          for i in $(seq 1 30); do
            if curl -fsS "$url"; then
              echo "Published artifact is visible on Maven Central: $url"
              exit 0
            fi
            echo "Maven Central artifact not visible yet (attempt $i/30); retrying"
            sleep 60
          done
          echo "Published artifact did not become visible on Maven Central: $url"
          exit 1

  github_release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # softprops/action-gh-release v3.0.0
        with:
          generate_release_notes: true
