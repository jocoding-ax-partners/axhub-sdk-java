name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    environment: maven-central
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # actions/setup-java v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # gradle/actions/setup-gradle v4.4.4
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify CI succeeded on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --json databaseId --jq 'length')
          [ "$count" -gt 0 ] || { echo "No successful ci.yml run found for $GITHUB_SHA"; exit 1; }
      - name: Verify release tag matches Gradle version
        run: |
          v=$(./gradlew -q properties --no-configuration-cache | awk -F': ' '/^version:/ { print $2; exit }')
          [ "${{ github.ref_name }}" = "v$v" ] || { echo "tag != v$v"; exit 1; }
      - name: Check before publish
        run: ./gradlew check --no-configuration-cache
      - name: Local publish dry-run
        run: ./gradlew publishToMavenLocal --no-configuration-cache
      - run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 35
    continue-on-error: true
    steps:
      - name: Wait for Maven Central artifact
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          url="https://repo1.maven.org/maven2/ai/axhub/axhub-sdk-java/$version/axhub-sdk-java-$version.pom"
          for i in $(seq 1 30); do
            curl -fsS "$url" && exit 0
            sleep 60
          done
          exit 1
